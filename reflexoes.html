<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reflexões Akáshicas — PORTAL DA CONSCIÊNCIA UNIVERSAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#05040f;--bg-card:rgba(14,12,28,.9);--accent:#a78bfa;--accent-bright:#c4b5fd;--gold:#f0c96b;--gold-dim:rgba(240,201,107,.6);--border:rgba(196,181,253,.13);--text:#ede9ff;--muted:rgba(196,181,253,.75);--radius:20px;--font-display:'Cinzel',serif;--font-body:'Cormorant Garamond',serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:18px;line-height:1.8;}
#universeCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.container{width:min(860px,calc(100% - 32px));margin:0 auto;padding:32px 0 80px;position:relative;z-index:1;}
.nav-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.nav-link{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:.65rem;letter-spacing:.12em;color:rgba(220,210,255,.92);text-decoration:none;padding:8px 18px;border:1px solid rgba(196,181,253,.15);border-radius:50px;transition:all .25s;background:rgba(5,4,15,.4);backdrop-filter:blur(8px);}
.nav-link:hover{color:#fff;border-color:rgba(220,210,255,.92);}
/* "← Voltar": linha amarela de contorno */
.nav-link[href*="perfil"]{border:1.5px solid var(--gold);color:var(--gold);box-shadow:0 0 12px rgba(240,201,107,.22);}
.nav-link[href*="perfil"]:hover{border-color:#f5d77a;color:#f5d77a;box-shadow:0 0 20px rgba(240,201,107,.4);}
.hero{text-align:center;margin-bottom:40px;}
.hero-badge{font-family:var(--font-display);font-size:.58rem;letter-spacing:.25em;color:var(--gold-dim);margin-bottom:14px;}
.hero-title{font-family:var(--font-display);font-size:clamp(1.4rem,3.5vw,2.2rem);font-weight:700;color:var(--accent-bright);margin-bottom:8px;text-shadow:0 0 40px rgba(167,139,250,.3);}
.hero-sub{font-size:1rem;color:rgba(220,210,255,.92);font-style:italic;}
.btn-gerar{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;font-family:var(--font-display);font-size:.78rem;letter-spacing:.12em;font-weight:600;color:#ffe9a8;background:linear-gradient(135deg,rgba(240,201,107,.20),rgba(240,201,107,.09));border:2px solid #ffe27a;border-radius:50px;cursor:pointer;transition:all .3s;margin-top:20px;box-shadow:0 0 9px rgba(245,211,106,.9),0 0 0 1px rgba(255,226,122,.6),inset 0 0 7px rgba(245,211,106,.35);text-shadow:0 0 7px rgba(245,211,106,.45);}
.btn-gerar:hover{background:linear-gradient(135deg,rgba(240,201,107,.32),rgba(240,201,107,.16));border-color:#f0c96b;box-shadow:0 0 34px rgba(240,201,107,.65),0 0 65px rgba(240,201,107,.3);transform:translateY(-2px);color:#f0c96b;}
.btn-gerar:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.spinner-wrap{display:none;flex-direction:column;justify-content:center;align-items:center;gap:14px;padding:32px;color:rgba(220,210,255,.92);font-family:var(--font-display);font-size:1rem;letter-spacing:.12em;}
.spinner-wrap.ativo{display:flex;}
@keyframes spin{to{transform:rotate(360deg);}}
.reflexoes-grid{display:flex;flex-direction:column;gap:20px;}
.reflexao-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.5), 0 0 40px rgba(240,201,107,.45), 0 0 80px rgba(240,201,107,.25), 0 0 140px rgba(184,142,40,.2), 0 0 0 1px rgba(240,201,107,.15);opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;position:relative;overflow:hidden;}
.reflexao-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,201,107,.25),transparent);}
.reflexao-card.visivel{opacity:1;transform:translateY(0);}
.reflexao-num{font-family:var(--font-display);font-size:.55rem;letter-spacing:.2em;color:rgba(240,201,107,.55);margin-bottom:16px;}
.reflexao-texto{font-size:1.2rem;line-height:2;color:rgba(235,230,255,.94);font-style:italic;margin-bottom:20px;position:relative;padding-left:20px;}
.reflexao-texto::before{content:'"';position:absolute;left:0;top:-8px;font-size:3rem;color:rgba(240,201,107,.15);font-family:Georgia,serif;line-height:1;}
.reflexao-autor-wrap{display:flex;align-items:center;gap:12px;}
.reflexao-sep{flex:1;height:1px;background:linear-gradient(90deg,rgba(196,181,253,.15),transparent);}
.reflexao-autor{font-family:var(--font-display);font-size:.88rem;letter-spacing:.1em;color:var(--gold-dim);text-align:right;}
.reflexao-origem{font-size:.9rem;color:rgba(220,210,255,.92);text-align:right;margin-top:2px;font-style:italic;}
.rodape{text-align:center;padding:32px 0 0;opacity:0;transition:opacity 1s;}
.rodape.visivel{opacity:1;}
.rodape-sep{font-family:var(--font-display);font-size:.6rem;letter-spacing:.3em;color:rgba(196,181,253,.2);}
@media(max-width:600px){.reflexao-card{padding:20px;}.reflexao-texto{font-size:1.05rem;}}

    @keyframes btnPulseGold { 0%,100%{box-shadow:0 0 4px rgba(240,201,107,.15);border-color:rgba(240,201,107,.35);}50%{box-shadow:0 0 14px rgba(240,201,107,.45);border-color:rgba(240,201,107,.75);} }
    @keyframes btnPulseGoldHover { 0%,100%{box-shadow:0 0 8px rgba(240,201,107,.4),0 0 0 1px rgba(240,201,107,.5);border-color:rgba(240,201,107,.6);}50%{box-shadow:0 0 22px rgba(240,201,107,.8),0 0 0 2px rgba(240,201,107,.9);border-color:#f0c96b;} }
        @keyframes reflexFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  </style>
</head>
<body>
<audio id="ambientAudio" loop preload="none" src="/soul-frequencies.mp3"></audio>
<div style="position:fixed;top:14px;right:16px;z-index:998;">
  <button class="btn-som-inject" onclick="window.toggleSound && window.toggleSound()" title="Som" style="background:rgba(14,12,28,.8);border:1px solid rgba(196,181,253,.25);border-radius:20px;padding:5px 11px;cursor:pointer;display:flex;align-items:center;"></button>
</div>
<canvas id="universeCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
  <script>
  (function(){
    const canvas = document.getElementById('universeCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, stars=[], nebulae=[], galaxies=[], spaceships=[], starClusters=[], t=0;
    const startTime = Date.now(); // Tempo de início do programa
    function resize(){
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initScene();
    }
    function rand(a,b){ return a + Math.random()*(b-a); }
    function initScene(){
      stars = [];
      const count = Math.floor((W*H)/1200);
      for(let i=0;i<count;i++){
        const spd=rand(0.3,1.2); stars.push({ x:rand(0,W), y:rand(0,H), r:rand(0.5,2.2), alpha:rand(0.4,1), speed:rand(0.0003,0.0012), phase:rand(0,Math.PI*2), color:Math.random()<0.20?`hsl(${rand(200,280)},85%,92%)`:'#fff', dx:spd*0.7, dy:spd*0.2 });
      }
      
      // Adiciona estrelas MUITO brilhantes (ULTRA RARAS)
      const brightStarCount = Math.floor((W*H)/80000); // Ultra raras!
      for(let i=0; i<brightStarCount; i++){
        const spd=rand(0.2,0.8);
        const size = rand(2.5, 7); // Tamanhos MUITO variados (pequenas a grandes)
        stars.push({ 
          x:rand(0,W), 
          y:rand(0,H), 
          r:size,
          alpha:1,
          speed:rand(0.0005,0.0015), 
          phase:rand(0,Math.PI*2), 
          color:'#ffffff', 
          dx:spd*0.5, 
          dy:spd*0.15,
          isBright: true
        });
      }
      
      // Aglomerados de estrelas RAROS (movem-se lentamente)
      starClusters = [];
      // Apenas 0-1 aglomerado inicial (muito raros!)
      if(Math.random() < 0.3){
        const cluster = {
          x: rand(0, W),
          y: rand(H*0.2, H*0.8),
          radius: rand(40, 100),
          dx: rand(0.3, 0.8),
          stars: []
        };
        
        const numStars = Math.floor(rand(12, 25)); // Menos estrelas
        for(let s=0; s<numStars; s++){
          const angle = Math.random() * Math.PI * 2;
          const distance = Math.random() * cluster.radius;
          cluster.stars.push({
            offsetX: Math.cos(angle) * distance,
            offsetY: Math.sin(angle) * distance,
            size: rand(0.3, 1.0),
            alpha: rand(0.2, 0.5),
            color: Math.random() < 0.3 ? `hsl(${rand(200,280)},70%,85%)` : 'rgba(255,255,255,0.6)'
          });
        }
        starClusters.push(cluster);
      }
      
      nebulae = [];
      const cols = [[120,70,200],[60,100,255],[200,80,160],[30,120,220],[160,60,220],[80,160,255],[255,140,80],[100,200,255]];
      for(let i=0;i<15;i++){
        const [r,g,b] = cols[i%cols.length];
        nebulae.push({ x:rand(0,W), y:rand(0,H), rx:rand(W*.15,W*.5), ry:rand(H*.12,H*.4), alpha:rand(0.08,0.18), angle:rand(0,Math.PI), r,g,b, driftX:rand(-0.03,0.03), driftY:rand(-0.02,0.02), rotSpeed:rand(-0.00005,0.00005), pulseSpeed:rand(0.0003,0.0008), pulsePhase:rand(0,Math.PI*2) });
      }
      
      spaceships = [];
    }
    function createSpaceship() {
      if(Math.random() < 0.004 && spaceships.length < 2) {
        const direction = Math.random() < 0.5 ? 1 : -1; // Esquerda→Direita ou Direita→Esquerda
        spaceships.push({
          x: direction > 0 ? -50 : W + 50,
          y: rand(H * 0.2, H * 0.8),
          size: rand(8, 14),
          speed: rand(15, 25) * direction,
          lightPhase: rand(0, Math.PI * 2),
          lightSpeed: rand(0.2, 0.3),
          color: Math.random() < 0.5 ? [100, 200, 255] : [200, 100, 255],
          trail: []
        });
      }
    }
    function drawSpaceships() {
      spaceships.forEach((ship, idx) => {
        // Adiciona posição atual ao rastro
        ship.trail.push({ x: ship.x, y: ship.y, alpha: 1 });
        if(ship.trail.length > 15) ship.trail.shift();
        
        // Desenha rastro de luz
        ship.trail.forEach((point, i) => {
          const alpha = (i / ship.trail.length) * point.alpha;
          const size = ship.size * 0.3 * (i / ship.trail.length);
          
          ctx.save();
          ctx.globalAlpha = alpha * 0.6;
          ctx.shadowBlur = 15;
          ctx.shadowColor = `rgba(${ship.color[0]}, ${ship.color[1]}, ${ship.color[2]}, ${alpha})`;
          
          // Partícula de luz do rastro
          const gradient = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, size * 3);
          gradient.addColorStop(0, `rgba(255, 255, 255, ${alpha * 0.8})`);
          gradient.addColorStop(0.5, `rgba(${ship.color[0]}, ${ship.color[1]}, ${ship.color[2]}, ${alpha * 0.6})`);
          gradient.addColorStop(1, `rgba(${ship.color[0]}, ${ship.color[1]}, ${ship.color[2]}, 0)`);
          
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(point.x, point.y, size * 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          
          point.alpha *= 0.95;
        });
        
        // Desenha a nave
        ctx.save();
        ctx.translate(ship.x, ship.y);
        
        // Corpo da nave
        ctx.fillStyle = `rgba(${ship.color[0]}, ${ship.color[1]}, ${ship.color[2]}, 0.9)`;
        ctx.shadowBlur = 12;
        ctx.shadowColor = `rgba(${ship.color[0]}, ${ship.color[1]}, ${ship.color[2]}, 0.8)`;
        
        // Cúpula superior
        ctx.beginPath();
        ctx.ellipse(0, -ship.size*0.15, ship.size*0.5, ship.size*0.25, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Disco principal
        ctx.fillStyle = `rgba(${ship.color[0] - 30}, ${ship.color[1] - 30}, ${ship.color[2] - 30}, 0.8)`;
        ctx.beginPath();
        ctx.ellipse(0, 0, ship.size*0.8, ship.size*0.3, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Luz piscante central
        const lightBlink = Math.sin(ship.lightPhase) * 0.5 + 0.5;
        ctx.fillStyle = `rgba(255, 255, 200, ${lightBlink})`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = `rgba(255, 255, 200, ${lightBlink})`;
        ctx.beginPath();
        ctx.arc(0, 0, ship.size*0.15, 0, Math.PI*2);
        ctx.fill();
        
        ctx.restore();
        
        // Movimento horizontal
        ship.x += ship.speed;
        ship.lightPhase += ship.lightSpeed;
        
        // Remove naves que saíram da tela
        if(ship.x < -100 || ship.x > W + 100) {
          spaceships.splice(idx, 1);
        }
      });
    }
    function drawBg(){
      const bg = ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.5,Math.max(W,H)*.8);
      bg.addColorStop(0,'#0d0820'); bg.addColorStop(0.4,'#060314'); bg.addColorStop(1,'#020108');
      ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    }
    function drawStarClusters(){
      // Move e desenha aglomerados
      starClusters.forEach((cluster, idx) => {
        cluster.x += cluster.dx;
        
        // Remove aglomerados que saíram da tela
        if(cluster.x > W + cluster.radius*2){
          starClusters.splice(idx, 1);
        }
        
        cluster.stars.forEach(star => {
          const starX = cluster.x + star.offsetX;
          const starY = cluster.y + star.offsetY;
          
          ctx.globalAlpha = star.alpha;
          ctx.fillStyle = star.color;
          ctx.beginPath();
          ctx.arc(starX, starY, star.size, 0, Math.PI*2);
          ctx.fill();
          
          // Pequeno brilho para estrelas maiores
          if(star.size > 0.7){
            const glow = ctx.createRadialGradient(starX, starY, 0, starX, starY, star.size*2);
            glow.addColorStop(0, `rgba(255,255,255,${star.alpha*0.3})`);
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(starX, starY, star.size*2, 0, Math.PI*2);
            ctx.fill();
          }
        });
      });
      ctx.globalAlpha = 1;
    }
    
    function createStarCluster(){
      // RARO: 0.15% de chance por frame, máximo 2 aglomerados
      if(Math.random() < 0.0015 && starClusters.length < 2){
        const cluster = {
          x: -100,
          y: rand(H*0.2, H*0.8),
          radius: rand(40, 100),
          dx: rand(0.3, 0.8),
          stars: []
        };
        
        const numStars = Math.floor(rand(12, 25)); // Menos estrelas
        for(let s=0; s<numStars; s++){
          const angle = Math.random() * Math.PI * 2;
          const distance = Math.random() * cluster.radius;
          cluster.stars.push({
            offsetX: Math.cos(angle) * distance,
            offsetY: Math.sin(angle) * distance,
            size: rand(0.3, 1.0),
            alpha: rand(0.2, 0.5),
            color: Math.random() < 0.3 ? `hsl(${rand(200,280)},70%,85%)` : 'rgba(255,255,255,0.6)'
          });
        }
        starClusters.push(cluster);
      }
    }
    
    function drawGalaxies(){
      galaxies.forEach(g=>{
        ctx.save();
        ctx.translate(g.x, g.y);
        ctx.rotate(g.angle);
        g.angle += g.rotationSpeed;
        
        // Escala para perspectiva 3D
        ctx.scale(1, g.ry/g.rx);
        
        // GALÁXIA ESPIRAL REALISTA
        
        // Halo externo brilhante
        const haloGrad = ctx.createRadialGradient(0,0,0,0,0,g.rx*1.2);
        haloGrad.addColorStop(0,`rgba(${g.color[0]+40},${g.color[1]+40},${g.color[2]+40},${g.alpha*0.5})`);
        haloGrad.addColorStop(0.5,`rgba(${g.color[0]+20},${g.color[1]+20},${g.color[2]+20},${g.alpha*0.3})`);
        haloGrad.addColorStop(1,`rgba(${g.color[0]},${g.color[1]},${g.color[2]},0)`);
        ctx.fillStyle = haloGrad;
        ctx.beginPath();
        ctx.arc(0,0,g.rx*1.2,0,Math.PI*2);
        ctx.fill();
        
        // Núcleo galáctico super brilhante
        const coreGrad = ctx.createRadialGradient(0,0,0,0,0,g.rx*0.2);
        coreGrad.addColorStop(0,'rgba(255,255,255,0.9)');
        coreGrad.addColorStop(0.4,`rgba(${g.color[0]+80},${g.color[1]+80},${g.color[2]+80},0.7)`);
        coreGrad.addColorStop(1,`rgba(${g.color[0]},${g.color[1]},${g.color[2]},0.3)`);
        ctx.shadowBlur = 25;
        ctx.shadowColor = `rgba(${g.color[0]},${g.color[1]},${g.color[2]},0.8)`;
        ctx.fillStyle = coreGrad;
        ctx.beginPath();
        ctx.arc(0,0,g.rx*0.2,0,Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Braços espirais (3-4 braços)
        const numArms = 3 + Math.floor(Math.random()*2);
        ctx.globalAlpha = 0.9;
        
        for(let armIdx=0; armIdx<numArms; armIdx++){
          ctx.save();
          ctx.rotate((Math.PI*2/numArms)*armIdx);
          
          // Desenha braço espiral
          ctx.beginPath();
          for(let i=0; i<=100; i++){
            const t = i/100;
            const angle = t * Math.PI * 2.2;
            const radius = t * g.rx * 0.9;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
          }
          
          const armGrad = ctx.createLinearGradient(0,0,g.rx*0.9,0);
          armGrad.addColorStop(0,`rgba(${g.color[0]+100},${g.color[1]+100},${g.color[2]+100},0.8)`);
          armGrad.addColorStop(0.5,`rgba(${g.color[0]+50},${g.color[1]+30},${g.color[2]+70},0.6)`);
          armGrad.addColorStop(1,`rgba(${g.color[0]},${g.color[1]},${g.color[2]},0.2)`);
          
          ctx.strokeStyle = armGrad;
          ctx.lineWidth = 5;
          ctx.shadowBlur = 10;
          ctx.shadowColor = `rgba(${g.color[0]},${g.color[1]},${g.color[2]},0.5)`;
          ctx.stroke();
          
          // Estrelas no braço
          for(let s=0; s<30; s++){
            const t = Math.random();
            const angle = t * Math.PI * 2.2;
            const radius = t * g.rx * 0.85;
            const x = Math.cos(angle) * radius + (Math.random()-0.5)*8;
            const y = Math.sin(angle) * radius + (Math.random()-0.5)*8;
            
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.shadowBlur = 3;
            ctx.shadowColor = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.arc(x,y,Math.random()*1.5+0.5,0,Math.PI*2);
            ctx.fill();
          }
          
          ctx.restore();
        }
        
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        ctx.restore();
      });
    }
    function drawNebulae(){
      nebulae.forEach(n=>{
        const pulse=Math.sin(t*n.pulseSpeed+n.pulsePhase)*0.4+0.8;
        ctx.save(); 
        ctx.translate(n.x,n.y); 
        ctx.rotate(n.angle);
        
        // Adiciona blur para efeito de nebulosa
        ctx.shadowBlur = 50;
        ctx.shadowColor = `rgba(${n.r},${n.g},${n.b},${n.alpha*0.5})`;
        
        const g=ctx.createRadialGradient(0,0,0,0,0,n.rx);
        const a=n.alpha*pulse;
        g.addColorStop(0,`rgba(${n.r},${n.g},${n.b},${a})`);
        g.addColorStop(0.3,`rgba(${n.r},${n.g},${n.b},${a*0.7})`);
        g.addColorStop(0.6,`rgba(${n.r},${n.g},${n.b},${a*0.4})`);
        g.addColorStop(1,`rgba(${n.r},${n.g},${n.b},0)`);
        
        ctx.scale(1,n.ry/n.rx); 
        ctx.beginPath(); 
        ctx.arc(0,0,n.rx,0,Math.PI*2); 
        ctx.fillStyle=g; 
        ctx.fill(); 
        ctx.restore();
        
        n.x+=n.driftX; n.y+=n.driftY; n.angle+=n.rotSpeed;
        if(n.x<-n.rx)n.x=W+n.rx; if(n.x>W+n.rx)n.x=-n.rx;
        if(n.y<-n.ry)n.y=H+n.ry; if(n.y>H+n.ry)n.y=-n.ry;
      });
    }
    function drawStars(){
      stars.forEach(s=>{
        s.x += s.dx; s.y += s.dy;
        if(s.x < -2) s.x = W+2; if(s.x > W+2) s.x = -2;
        if(s.y < -2) s.y = H+2; if(s.y > H+2) s.y = -2;
        
        // Estrelas brilhantes SEM cintilar (constante)
        if(s.isBright){
          const flicker = 1; // SEM cintilar - sempre no máximo!
          
          // Halo grande
          const bigGlow = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*8);
          bigGlow.addColorStop(0,`rgba(255,255,255,${0.4*flicker})`);
          bigGlow.addColorStop(0.3,`rgba(200,220,255,${0.2*flicker})`);
          bigGlow.addColorStop(1,'transparent');
          ctx.fillStyle=bigGlow;
          ctx.beginPath(); 
          ctx.arc(s.x,s.y,s.r*8,0,Math.PI*2); 
          ctx.fill();
          
          // Núcleo brilhante constante
          ctx.shadowBlur = 20;
          ctx.shadowColor = `rgba(255,255,255,${flicker})`;
          ctx.beginPath(); 
          ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle='#ffffff'; 
          ctx.globalAlpha=flicker; 
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.globalAlpha=1;
        } else {
          // Estrelas normais com cintilar
          const flicker=Math.sin(t*s.speed*1000+s.phase)*0.35+0.65;
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle=s.color; ctx.globalAlpha=s.alpha*flicker; ctx.fill();
          if(s.r>1.2){
            const glow=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);
            glow.addColorStop(0,`rgba(255,255,255,${0.15*flicker})`); glow.addColorStop(1,'transparent');
            ctx.beginPath(); ctx.arc(s.x,s.y,s.r*4,0,Math.PI*2); ctx.fillStyle=glow; ctx.fill();
          }
          ctx.globalAlpha=1;
        }
      });
    }
    function drawVignette(){
      const v=ctx.createRadialGradient(W*.5,H*.5,H*.2,W*.5,H*.5,Math.max(W,H)*.75);
      v.addColorStop(0,'transparent'); v.addColorStop(1,'rgba(2,1,8,0.72)');
      ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
    }
    function loop(ts){ 
      t=ts; 
      ctx.clearRect(0,0,W,H); 
      drawBg();
      createStarCluster();
      drawStarClusters();
      drawNebulae();
      drawStars();
      createSpaceship();
      drawSpaceships();
      drawVignette(); 
      requestAnimationFrame(loop); 
    }
    window.addEventListener('resize',resize); resize(); requestAnimationFrame(loop);
  })();
  </script>

    <p class="hero-sub">Palavras que atravessaram o tempo para chegar até você agora</p>
    <button class="btn-gerar" id="btnBuscar" onclick="buscarReflexoes()">✦ Revelar Reflexões</button>
  </div>

  <div class="spinner-wrap" id="spinnerWrap">
    <canvas id="atomoCanvasRef" width="120" height="120"></canvas>
    <span id="spinnerTxt" style="font-size:1rem;color:#e2e0f0;">Consultando os mestres...</span>
  </div>

  <!-- Voltar (esquerda) + Novas Reflexões (direita), acima do card -->
  <div class="nav-top" style="margin-bottom:20px;">
    <a href="/perfil" class="nav-link">← Voltar</a>
    <button id="btnNova" class="btn-gerar" onclick="buscarReflexoes()" style="padding:9px 20px;font-size:.66rem;margin-top:0;" disabled>Novas Reflexões</button>
  </div>

  <div class="reflexoes-grid" id="reflexoesGrid"></div>

  <div class="rodape" id="rodape">
    <div class="rodape-sep">✦ ✦ ✦</div>
  </div>
</div>

<script>


var spinnerTexts = [
  'Consultando os mestres...',
  'Atravessando os séculos...',
  'Selecionando sabedorias...',
  'Trazendo à luz as palavras...',
  'Os guardiões estão escolhendo...'
];
var spinnerIdx = 0, spinnerTimer = null;

async function buscarReflexoes() {
  var btnB = document.getElementById('btnBuscar');
  var btnN = document.getElementById('btnNova');
  var spinner = document.getElementById('spinnerWrap');
  var grid = document.getElementById('reflexoesGrid');
  var rodape = document.getElementById('rodape');

  btnB.disabled = true;
  btnN.disabled = true;
  spinner.classList.add('ativo');
  grid.innerHTML = '';
  rodape.classList.remove('visivel');

  spinnerTimer = setInterval(function() {
    spinnerIdx = (spinnerIdx + 1) % spinnerTexts.length;
    document.getElementById('spinnerTxt').textContent = spinnerTexts[spinnerIdx];
  }, 2000);

  // Carrega histórico dos últimos 7 dias do localStorage
  var historico = [];
  try {
    var user = JSON.parse(localStorage.getItem('akashic_user') || '{}');
    var email = user.email || 'anon';
    var chave = 'reflexoes_hist_' + email;
    var hist = JSON.parse(localStorage.getItem(chave) || '[]');
    var sete = Date.now() - 7 * 24 * 60 * 60 * 1000;
    // Remove reflexões com mais de 7 dias
    hist = hist.filter(function(h) { return h.ts > sete; });
    historico = hist.map(function(h) { return h.autor; });
    localStorage.setItem(chave, JSON.stringify(hist));
  } catch(e) {}

  try {
    var resp = await fetch('/api/reflexoes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ autores_usados: historico })
    });
    var data = await resp.json();

    clearInterval(spinnerTimer);
    spinner.classList.remove('ativo');

    // Mensagem amigável para erros específicos
    if (!resp.ok) {
      var msg = data.error || 'Erro ao buscar reflexões.';
      grid.innerHTML = '<div style="text-align:center;padding:32px;">'
        + '<div style="font-size:1.5rem;margin-bottom:12px;">🙏</div>'
        + '<div style="color:rgba(240,201,107,.85);font-family:\'Cinzel\',serif;font-size:.85rem;letter-spacing:.08em;margin-bottom:8px;">Um momento...</div>'
        + '<div style="color:rgba(196,181,253,.7);font-size:.88rem;line-height:1.7;">' + msg + '</div>'
        + '</div>';
      btnB.disabled = false;
      btnN.disabled = false;
      return;
    }

    if (!data.success || !data.reflexoes) throw new Error('Sem dados');

    data.reflexoes.forEach(function(r, i) {
      var card = document.createElement('div');
      card.className = 'reflexao-card';

      // Header com número e botão
      var header = document.createElement('div');
      header.className = 'reflexao-num';
      header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;';
      header.appendChild(document.createTextNode('0' + (i+1)));

      var btn = document.createElement('button');
      btn.dataset.texto = (r.reflexao || '').slice(0, 220); // sem escapar — direto no dataset
      btn.innerHTML = '🔊 Ouvir';
      btn.style.cssText = 'display:inline-flex;align-items:center;gap:5px;padding:4px 14px;font-size:.68rem;background:rgba(109,40,217,.15);border:1px solid rgba(167,139,250,.25);color:rgba(196,181,253,.7);border-radius:20px;cursor:pointer;transition:all .2s;font-family:\'Cinzel\',serif;letter-spacing:.06em;';
      btn.addEventListener('mouseover', function(){ this.style.background='rgba(109,40,217,.3)'; this.style.color='#c4b5fd'; });
      btn.addEventListener('mouseout',  function(){ this.style.background='rgba(109,40,217,.15)'; this.style.color='rgba(196,181,253,.7)'; });
      btn.addEventListener('click', function(){ ouvirReflexao(this); });
      header.appendChild(btn);

      // Corpo
      var texto = document.createElement('div');
      texto.className = 'reflexao-texto';
      texto.textContent = r.reflexao;

      var autorWrap = document.createElement('div');
      autorWrap.className = 'reflexao-autor-wrap';
      autorWrap.innerHTML = '<div class="reflexao-sep"></div>'
        + '<div><div class="reflexao-autor">' + (r.autor||'') + '</div>'
        + '<div class="reflexao-origem">' + (r.origem||'') + '</div></div>';

      card.appendChild(header);
      card.appendChild(texto);
      card.appendChild(autorWrap);
      grid.appendChild(card);
      setTimeout(function(el){ el.classList.add('visivel'); }, i*150+100, card);
    });

    setTimeout(function() { rodape.classList.add('visivel'); }, 900);
    // Salva autores no histórico de 7 dias
    try {
      var user2 = JSON.parse(localStorage.getItem('akashic_user') || '{}');
      var chave2 = 'reflexoes_hist_' + (user2.email || 'anon');
      var hist2 = JSON.parse(localStorage.getItem(chave2) || '[]');
      var sete2 = Date.now() - 7 * 24 * 60 * 60 * 1000;
      hist2 = hist2.filter(function(h) { return h.ts > sete2; });
      data.reflexoes.forEach(function(r) {
        hist2.push({ autor: r.autor, ts: Date.now() });
      });
      localStorage.setItem(chave2, JSON.stringify(hist2));
    } catch(e2) {}

    btnB.style.display = 'none';
    btnN.disabled = false;

  } catch(e) {
    clearInterval(spinnerTimer);
    spinner.classList.remove('ativo');
    grid.innerHTML = '<div style="text-align:center;color:rgba(220,210,255,.92);padding:32px;">Erro ao buscar reflexões. Tente novamente.</div>';
    btnB.disabled = false;
    btnN.disabled = false;
  }
}

window.addEventListener('DOMContentLoaded', function() { buscarReflexoes(); });

// ── Áudio Reflexões ──
var _refAudio = null;
var _refSessao = 0;

function ouvirReflexao(btn) {
  var texto = (btn.dataset.texto || '').slice(0, 220);

  // Sem texto — não faz nada
  if (!texto.trim()) return;

  // Se está tocando este mesmo botão → pausa
  if (btn._tocando && _refAudio && !_refAudio.paused) {
    _refAudio.pause();
    btn.innerHTML = '🔊 Ouvir';
    btn._tocando = false;
    return;
  }

  // Para qualquer áudio anterior
  if (_refAudio) { _refAudio.pause(); _refAudio.src = ''; _refAudio = null; }

  // Reseta todos os botões de reflexão
  document.querySelectorAll('.reflexao-card button').forEach(function(b) {
    b.innerHTML = '🔊 Ouvir';
    b._tocando = false;
  });

  // Incrementa sessão para cancelar fetches anteriores
  _refSessao++;
  var minhaSessao = _refSessao;

  btn.innerHTML = '🔊...';

  fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: texto })
  }).then(function(r) {
    if (minhaSessao !== _refSessao) return null; // cancelado
    if (!r.ok) throw new Error('TTS error');
    return r.blob();
  }).then(function(blob) {
    if (!blob || minhaSessao !== _refSessao) return;
    var url = URL.createObjectURL(blob);
    _refAudio = new Audio(url);
    btn.innerHTML = '⏸ Pausar';
    btn._tocando = true;
    _refAudio.addEventListener('ended', function() {
      URL.revokeObjectURL(url);
      btn.innerHTML = '🔊 Ouvir';
      btn._tocando = false;
      _refAudio = null;
    });
    _refAudio.addEventListener('error', function() {
      URL.revokeObjectURL(url);
      btn.innerHTML = '🔊 Ouvir';
      btn._tocando = false;
      _refAudio = null;
    });
    _refAudio.play();
  }).catch(function() {
    if (minhaSessao === _refSessao) {
      btn.innerHTML = '🔊 Ouvir';
      btn._tocando = false;
    }
  });
}
</script>

<script>
// ── Esfera com órbitas (spinner reflexões) ──
(function(){
  var cv=document.getElementById('atomoCanvasRef');
  if(!cv)return;
  var ctx=cv.getContext('2d');
  var CX=60,CY=60,R=32,t=0;
  function drawSphere(){
    var grd=ctx.createRadialGradient(CX-10,CY-12,2,CX,CY,R);
    grd.addColorStop(0,'#f0e8ff');grd.addColorStop(0.18,'#b080ff');grd.addColorStop(0.5,'#5010b0');grd.addColorStop(0.8,'#2d0a6e');grd.addColorStop(1,'#080318');
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    var hi=ctx.createRadialGradient(CX-10,CY-12,1,CX-6,CY-8,9);
    hi.addColorStop(0,'rgba(245,240,255,0.36)');hi.addColorStop(1,'rgba(245,240,255,0)');
    ctx.beginPath();ctx.ellipse(CX-6,CY-10,9,6,-0.3,0,Math.PI*2);ctx.fillStyle=hi;ctx.fill();
  }
  function drawGrid(){
    ctx.save();ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.clip();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.6;
    ctx.beginPath();ctx.ellipse(CX,CY,R*0.85,R*0.2,0,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.ellipse(CX,CY,R*0.19,R,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  function drawOrbit(a,rx,ry,col,lw,dash){
    ctx.save();ctx.translate(CX,CY);ctx.rotate(a);
    ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
    ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash(dash||[]);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  }
  function dot(a,rx,ry,da,r,col,glow){
    ctx.save();ctx.translate(CX,CY);ctx.rotate(a);
    var ox=Math.cos(da)*rx,oy=Math.sin(da)*ry;
    if(glow){var g=ctx.createRadialGradient(ox,oy,0,ox,oy,r*3);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');ctx.beginPath();ctx.arc(ox,oy,r*3,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
    ctx.beginPath();ctx.arc(ox,oy,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.restore();
  }
  function drawCruz(side){
    var sy=side==='top'?-1:1,py=CY+sy*R,col=side==='top'?'rgba(240,201,107,0.95)':'rgba(196,181,253,0.8)';
    ctx.strokeStyle=col;ctx.lineWidth=side==='top'?1.6:1.2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(CX-6,py);ctx.lineTo(CX+6,py);ctx.stroke();
    ctx.beginPath();ctx.moveTo(CX,py-4);ctx.lineTo(CX,py+4);ctx.stroke();
  }
  function drawCenter(){
    var pulse=0.7+0.3*Math.sin(t*2.5),r1=6*pulse;
    var g1=ctx.createRadialGradient(CX,CY,0,CX,CY,r1);g1.addColorStop(0,'rgba(255,252,200,0.5)');g1.addColorStop(1,'rgba(240,201,107,0)');
    ctx.beginPath();ctx.arc(CX,CY,r1,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
    ctx.beginPath();ctx.arc(CX,CY,4.5,0,Math.PI*2);ctx.strokeStyle='rgba(240,201,107,0.9)';ctx.lineWidth=1.2;ctx.stroke();
    var gc=ctx.createRadialGradient(CX-1,CY-1,0,CX,CY,3.2);gc.addColorStop(0,'rgba(255,252,200,0.95)');gc.addColorStop(1,'rgba(240,180,40,0.85)');
    ctx.beginPath();ctx.arc(CX,CY,3.2,0,Math.PI*2);ctx.fillStyle=gc;ctx.fill();
    ctx.beginPath();ctx.arc(CX,CY,1.2,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
  }
  function frame(){
    ctx.clearRect(0,0,120,120);
    var haloR=R+14+2*Math.sin(t*1.2);
    var hg=ctx.createRadialGradient(CX,CY,R+4,CX,CY,haloR);hg.addColorStop(0,'rgba(139,92,246,0.25)');hg.addColorStop(1,'rgba(139,92,246,0)');
    ctx.beginPath();ctx.arc(CX,CY,haloR,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
    drawSphere();drawGrid();
    var rx=R+4,ry=9;
    drawOrbit(0,rx,ry,'rgba(240,201,107,0.9)',1.8);
    drawOrbit(Math.PI/3,rx,ry,'rgba(196,181,253,0.8)',1.4);
    drawOrbit(-Math.PI*0.3,rx,ry,'rgba(196,181,253,0.5)',0.9);
    drawOrbit(Math.PI/6,rx,ry,'rgba(196,181,253,0.28)',0.6,[2,3]);
    dot(0,rx,ry,0.8+t*6.0,3.8,'#f0c96b',true);
    dot(0,rx,ry,0.8+t*6.0+Math.PI,2.5,'rgba(240,201,107,0.55)',false);
    dot(Math.PI/3,rx,ry,2.2+t*4.0,3,'#c4b5fd',true);
    dot(Math.PI/3,rx,ry,2.2+t*4.0+Math.PI,2,'rgba(196,181,253,0.5)',false);
    dot(-Math.PI*0.3,rx,ry,1.5+t*8.0,2.2,'#f0c96b',false);
    drawCruz('top');drawCruz('bottom');drawCenter();
    t+=0.018;requestAnimationFrame(frame);
  }
  frame();
})();
</script>

<script>
// ── Som ambiente ──
(function(){
  var audio = document.getElementById('ambientAudio');
  if(!audio) return;
  var playing = false;
  var SOM_MUDO = '<svg width="18" height="18" viewBox="-28 -24 56 48" style="display:inline-block;vertical-align:middle;"><polygon points="-18,-12 -18,12 -6,12 8,22 8,-22 -6,-12" fill="rgba(196,181,253,0.65)" stroke="rgba(196,181,253,0.5)" stroke-width="1"/><line x1="12" y1="-12" x2="22" y2="12" stroke="rgba(255,100,100,0.9)" stroke-width="2.5" stroke-linecap="round"/><line x1="22" y1="-12" x2="12" y2="12" stroke="rgba(255,100,100,0.9)" stroke-width="2.5" stroke-linecap="round"/></svg>';
  var SOM_ATIVO = '<svg width="18" height="18" viewBox="-28 -28 56 56" style="display:inline-block;vertical-align:middle;"><polygon points="-18,-12 -18,12 -6,12 8,22 8,-22 -6,-12" fill="rgba(196,181,253,0.85)" stroke="rgba(196,181,253,0.5)" stroke-width="1"/><path d="M12,-14 Q22,0 12,14" fill="none" stroke="rgba(240,201,107,0.9)" stroke-width="2.2" stroke-linecap="round"/><path d="M18,-22 Q34,0 18,22" fill="none" stroke="rgba(240,201,107,0.55)" stroke-width="1.5" stroke-linecap="round"/></svg>';
  function updateBtn(ativo){ document.querySelectorAll('.btn-som-inject').forEach(function(b){ b.innerHTML = ativo ? SOM_ATIVO : SOM_MUDO; }); }
  function fadeIn(){ var v=0; var t=setInterval(function(){ v=Math.min(0.35,v+0.015); audio.volume=v; if(v>=0.35)clearInterval(t); },100); }
  function tryPlay(){ audio.volume=0; audio.play().then(function(){ fadeIn(); updateBtn(true); playing=true; }).catch(function(){ updateBtn(false); }); }
  window.toggleSound = function(){ if(playing){ audio.pause(); updateBtn(false); playing=false; } else { tryPlay(); } };
  document.addEventListener('DOMContentLoaded', function(){ updateBtn(false); tryPlay(); });
})();
</script>
